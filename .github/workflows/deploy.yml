# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
#  Civitas AI — Auto-Deploy to Firebase Hosting
#
#  Triggers on every push to main (i.e. when a PR is merged).
#  Requires the following GitHub Secrets to be set:
#
#    FIREBASE_SERVICE_ACCOUNT  — Firebase service account JSON (for deployment)
#    VITE_FIREBASE_API_KEY
#    VITE_FIREBASE_AUTH_DOMAIN
#    VITE_FIREBASE_PROJECT_ID
#    VITE_FIREBASE_STORAGE_BUCKET
#    VITE_FIREBASE_MESSAGING_SENDER_ID
#    VITE_FIREBASE_APP_ID
#    VITE_GEMINI_API_KEY
#
#  HOW TO SET UP SECRETS:
#    GitHub repo → Settings → Secrets and variables → Actions → New repository secret
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploying
        run: |
          node tests/matchService.test.mjs
          node tests/formatters.test.mjs

      - name: Build production bundle
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** https://${{ secrets.VITE_FIREBASE_PROJECT_ID }}.web.app" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
