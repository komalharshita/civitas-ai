# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
#  Civitas AI — Auto-Deploy to Firebase Hosting
#
#  Triggers on every push to main (i.e. when a PR is merged).
#  Requires the following GitHub Secrets to be set:
#
#    FIREBASE_SERVICE_ACCOUNT  — Firebase service account JSON (for deployment)
#    VITE_FIREBASE_API_KEY
#    VITE_FIREBASE_AUTH_DOMAIN
#    VITE_FIREBASE_PROJECT_ID
#    VITE_FIREBASE_STORAGE_BUCKET
#    VITE_FIREBASE_MESSAGING_SENDER_ID
#    VITE_FIREBASE_APP_ID
#    VITE_GEMINI_API_KEY
#
#  HOW TO SET UP SECRETS:
#    GitHub repo → Settings → Secrets and variables → Actions → New repository secret
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: civitas-ai-71fdc
